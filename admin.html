<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M Brand Admin | Store Control Room</title>
  <meta name="description" content="Manage M Brand products, pricing, stock, and order statuses from the admin control room." />
  <meta name="keywords" content="M Brand admin, inventory management, order management, store dashboard, product pricing" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#04040d" />
  <meta property="og:title" content="M Brand Admin | Store Control Room" />
  <meta property="og:description" content="Oversee products, stock, pricing, and customer orders from the M Brand admin dashboard." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/m-favicon.svg" />
  <meta property="og:url" content="/admin.html" />
  <link rel="icon" type="image/svg+xml" href="/m-favicon.svg" />
  <link rel="shortcut icon" href="/m-favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/storefront-shell.css" />
</head>
<body>
  <div class="shell">
    <header class="page-nav">
      <div class="brand-pill">
        <a class="brand-mark" href="/index.html">M</a>
        <div class="brand-copy"><strong>ADMIN</strong><span>Orders, pricing, products, and stock</span></div>
      </div>
      <div class="page-nav-right">
        <a class="nav-link" href="/searchPage.html">Storefront</a>
        <button class="ghost-btn" id="adminLogout" type="button">Logout</button>
      </div>
    </header>
    <main class="page-main">
      <section class="hero">
        <div>
          <div class="eyebrow">Operations</div>
          <h1>MANAGE THE<br />STORE</h1>
          <p>Control products, stock, prices, and order statuses from one clean panel.</p>
        </div>
      </section>

      <section class="grid two" style="margin-top:20px;align-items:start">
        <div class="panel">
          <div class="eyebrow">Add product</div>
          <h2>New Catalog Entry</h2>
          <form id="productForm" class="stack">
            <div class="field-row">
              <input class="field" name="sku" placeholder="SKU" required />
              <input class="field" name="slug" placeholder="Slug" required />
            </div>
            <input class="field" name="name" placeholder="Product name" required />
            <div class="field-row">
              <input class="field" name="brand" placeholder="Brand" required />
              <select class="field" name="category" required>
                <option value="shirts">Shirts</option>
                <option value="pants">Pants</option>
                <option value="shoes">Shoes</option>
                <option value="accessories">Accessories</option>
                <option value="outerwear">Outerwear</option>
                <option value="watches">Watches</option>
                <option value="bags">Bags</option>
                <option value="jewelry">Jewelry</option>
              </select>
            </div>
            <input class="field" name="subcategory" placeholder="Subcategory" required />
            <textarea class="textarea" name="description" placeholder="Description" required></textarea>
            <div class="field-row">
              <input class="field" name="price" type="number" placeholder="Price" required />
              <input class="field" name="originalPrice" type="number" placeholder="Original price" />
            </div>
            <input class="field" name="imageUrl" placeholder="Image URL or data URI" required />
            <div class="field-row">
              <input class="field" name="colors" placeholder="Colors comma separated" />
              <input class="field" name="sizes" placeholder="Sizes comma separated" />
            </div>
            <input class="field" name="tags" placeholder="Tags comma separated" />
            <button class="btn" type="submit">Create Product</button>
          </form>
          <div class="notice" id="adminNotice" style="margin-top:14px">Admin tools ready.</div>
        </div>

        <div class="panel">
          <div class="eyebrow">Orders</div>
          <h2>Recent Orders</h2>
          <div class="page-actions" style="margin-bottom:12px">
            <select class="field" id="orderStatusFilter" style="max-width:220px">
              <option value="">All statuses</option>
              <option value="placed">Placed</option>
              <option value="processing">Processing</option>
              <option value="shipped">Shipped</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div id="adminOrders" class="stack"></div>
          <div class="page-actions" id="ordersPager" style="margin-top:12px"></div>
        </div>
      </section>

      <section class="panel" style="margin-top:20px">
        <div class="eyebrow">Catalog</div>
        <h2>Products</h2>
        <div class="page-actions" style="margin-bottom:12px">
          <input class="field" id="productSearch" placeholder="Filter products by name or brand" style="max-width:320px" />
        </div>
        <div id="adminProducts" class="stack"></div>
        <div class="page-actions" id="productsPager" style="margin-top:12px"></div>
      </section>
    </main>
  </div>
  <script src="/shared-store.js"></script>
  <script>
    const notice = document.getElementById("adminNotice");
    const orderStatusFilter = document.getElementById("orderStatusFilter");
    const productSearch = document.getElementById("productSearch");
    const productsPager = document.getElementById("productsPager");
    const ordersPager = document.getElementById("ordersPager");
    const dashboardState = { productPage: 1, orderPage: 1, productQuery: "", orderStatus: "", pageSize: 6, products: [], orders: [] };

    document.getElementById("adminLogout").addEventListener("click", async ()=>{ await MStore.logout(); window.location.href="/admin-login.html"; });

    async function ensureAdmin() {
      const session = await MStore.getSession();
      if (!session || !session.isAdmin) { window.location.href = "/admin-login.html"; return false; }
      return true;
    }

    function renderPager(target, totalItems, currentPage, onPage) {
      const totalPages = Math.max(1, Math.ceil(totalItems / dashboardState.pageSize));
      target.innerHTML = "";
      const prev = document.createElement("button");
      prev.className = "ghost-btn";
      prev.type = "button";
      prev.textContent = "Prev";
      prev.disabled = currentPage <= 1;
      prev.addEventListener("click", ()=> onPage(currentPage - 1));
      const stat = document.createElement("span");
      stat.className = "pill";
      stat.textContent = `Page ${currentPage} / ${totalPages}`;
      const next = document.createElement("button");
      next.className = "ghost-btn";
      next.type = "button";
      next.textContent = "Next";
      next.disabled = currentPage >= totalPages;
      next.addEventListener("click", ()=> onPage(currentPage + 1));
      target.appendChild(prev);
      target.appendChild(stat);
      target.appendChild(next);
    }

    function renderProductTable() {
      const filtered = dashboardState.products.filter((product) => {
        const q = dashboardState.productQuery.trim().toLowerCase();
        if (!q) return true;
        return `${product.name} ${product.brand}`.toLowerCase().includes(q);
      });
      const start = (dashboardState.productPage - 1) * dashboardState.pageSize;
      const pageItems = filtered.slice(start, start + dashboardState.pageSize);

      document.getElementById("adminProducts").innerHTML = pageItems.map((product)=>`
        <div class="card"><div class="card-body">
          <div class="page-actions" style="justify-content:space-between"><strong>${product.name}</strong><span class="pill">${product.category}</span></div>
          <div class="muted">${product.brand} / ${product.subcategory}</div>
          <div class="field-row" style="margin-top:12px">
            <input class="field" value="${product.price}" data-price="${product._id}" />
            <select class="field" data-stock="${product._id}">
              <option value="true" ${product.inStock ? "selected" : ""}>In stock</option>
              <option value="false" ${!product.inStock ? "selected" : ""}>Out of stock</option>
            </select>
          </div>
          <div class="page-actions" style="margin-top:12px">
            <button class="btn" type="button" data-save="${product._id}">Save</button>
            <a class="ghost-btn" href="/product/${product.slug}">View</a>
          </div>
        </div></div>`).join("");

      renderPager(productsPager, filtered.length, dashboardState.productPage, (nextPage)=>{ dashboardState.productPage = nextPage; renderProductTable(); });

      document.querySelectorAll("[data-save]").forEach((button)=>button.addEventListener("click", async ()=>{
        const id = button.dataset.save;
        const price = document.querySelector(`[data-price="${id}"]`).value;
        const inStock = document.querySelector(`[data-stock="${id}"]`).value === "true";
        const product = dashboardState.products.find((entry)=>entry._id===id);
        await MStore.api(`/api/admin/products/${id}`, {
          method: "PATCH",
          body: JSON.stringify(Object.assign({}, product, { price, inStock }))
        });
        notice.textContent = "Product updated.";
        MStore.toast({ tone:"success", title:"Product Updated", message:`${product.name} was saved.` });
      }));
    }

    function renderOrderTable() {
      const filtered = dashboardState.orders.filter((order) => {
        if (!dashboardState.orderStatus) return true;
        return order.status === dashboardState.orderStatus;
      });
      const start = (dashboardState.orderPage - 1) * dashboardState.pageSize;
      const pageItems = filtered.slice(start, start + dashboardState.pageSize);

      document.getElementById("adminOrders").innerHTML = pageItems.map((order)=>`
        <div class="card"><div class="card-body">
          <div class="page-actions" style="justify-content:space-between"><strong>${order.user ? order.user.name : "Customer"}</strong><span class="pill">${order._id.slice(-8)}</span></div>
          <div class="muted">${order.items.map((item)=>item.name).join(", ")}</div>
          <div class="field-row" style="margin-top:12px">
            <select class="field" data-order-status="${order._id}">
              ${["placed","processing","shipped","delivered","cancelled"].map((status)=>`<option value="${status}" ${order.status===status?"selected":""}>${status}</option>`).join("")}
            </select>
            <button class="btn" type="button" data-order-save="${order._id}">Update</button>
          </div>
        </div></div>`).join("");

      renderPager(ordersPager, filtered.length, dashboardState.orderPage, (nextPage)=>{ dashboardState.orderPage = nextPage; renderOrderTable(); });

      document.querySelectorAll("[data-order-save]").forEach((button)=>button.addEventListener("click", async ()=>{
        const id = button.dataset.orderSave;
        const status = document.querySelector(`[data-order-status="${id}"]`).value;
        await MStore.api(`/api/admin/orders/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ status, paymentStatus: "paid" })
        });
        notice.textContent = "Order updated.";
        MStore.toast({ tone:"success", title:"Order Updated", message:`Order ${id.slice(-8)} moved to ${status}.` });
      }));
    }

    async function loadDashboard() {
      if (!(await ensureAdmin())) return;
      const [products, orders] = await Promise.all([
        MStore.api("/api/admin/products"),
        MStore.api("/api/admin/orders")
      ]);
      dashboardState.products = products.products || [];
      dashboardState.orders = orders.orders || [];
      renderProductTable();
      renderOrderTable();
    }

    document.getElementById("productForm").addEventListener("submit", async (event)=>{
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        await MStore.api("/api/admin/products", {
          method: "POST",
          body: JSON.stringify({
            sku: form.get("sku"),
            slug: form.get("slug"),
            name: form.get("name"),
            brand: form.get("brand"),
            category: form.get("category"),
            subcategory: form.get("subcategory"),
            description: form.get("description"),
            price: form.get("price"),
            originalPrice: form.get("originalPrice"),
            imageUrl: form.get("imageUrl"),
            colors: form.get("colors"),
            sizes: form.get("sizes"),
            tags: form.get("tags"),
            inStock: true
          })
        });
        notice.textContent = "Product created.";
        MStore.toast({ tone:"success", title:"Product Created", message:"A new catalog item is live." });
        event.currentTarget.reset();
        loadDashboard();
      } catch (error) {
        notice.textContent = error.message;
        MStore.toast({ tone:"error", title:"Admin Action Failed", message:error.message });
      }
    });

    productSearch.addEventListener("input", ()=>{
      dashboardState.productQuery = productSearch.value;
      dashboardState.productPage = 1;
      renderProductTable();
    });

    orderStatusFilter.addEventListener("change", ()=>{
      dashboardState.orderStatus = orderStatusFilter.value;
      dashboardState.orderPage = 1;
      renderOrderTable();
    });

    loadDashboard();
  </script>
</body>
</html>
